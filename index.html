<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutomatizeNow | Automatizaciones para Empresas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:#080808;

color:white;

overflow:hidden;

}

body::before{

content:"";

position:absolute;

width:700px;
height:700px;

background:radial-gradient(circle,#8B5CF6 0%,transparent 70%);

filter:blur(120px);

opacity:.25;

}

.container{

position:relative;

text-align:center;

max-width:700px;

padding:40px;

animation:fade 1.2s ease;

}

.logo{

font-size:64px;

font-weight:700;

letter-spacing:-2px;

}

.logo span{

color:#8B5CF6;

}

.subtitle{

margin-top:25px;

font-size:22px;

color:#d4d4d4;

line-height:1.6;

}

.badge{

display:inline-block;

margin-top:40px;

padding:10px 18px;

border:1px solid rgba(255,255,255,.15);

border-radius:999px;

background:rgba(255,255,255,.04);

}

.email{

margin-top:35px;

font-size:18px;

}

.email a{

color:#8B5CF6;

text-decoration:none;

}

.footer{

margin-top:60px;

font-size:14px;

opacity:.55;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

Automatize<span>Now</span>

</div>

<div class="badge">

🚀 Próximamente

</div>

<div class="subtitle">

Estamos construyendo una nueva generación de automatizaciones con Inteligencia Artificial para ayudar a las empresas a ahorrar tiempo, vender más y crecer.

</div>

<div class="email">

📩

<a href="mailto:automatizenow.team@gmail.com">

automatizenow.team@gmail.com

</a>

</div>

<div class="footer">

© 2026 AutomatizeNow. Todos los derechos reservados.

</div>

</div>

</body>
</html>
