<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mensaje recibido — AutomatizeNow</title>
  <meta name="description" content="Hemos recibido tu mensaje. Te responderemos en menos de 24 horas.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#070707">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #070707;
      --text: #f5f5f7;
      --text-muted: rgba(235, 235, 245, 0.62);
      --accent: #6d5bff;
      --accent-bright: #8b76ff;
      --border: rgba(255, 255, 255, 0.08);
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    }
    html { -webkit-text-size-adjust: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: clamp(20px, 4vw, 32px);
    }
    ::selection { background: rgba(109, 91, 255, 0.35); color: #fff; }
    a { color: inherit; text-decoration: none; }
    svg { display: block; }
    :focus-visible { outline: 2px solid var(--accent-bright); outline-offset: 3px; border-radius: 6px; }

    .panel {
      max-width: 480px;
      width: 100%;
      text-align: center;
      padding: clamp(40px, 7vw, 64px) clamp(24px, 5vw, 48px);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      opacity: 0;
      animation: rise 0.8s var(--ease-out) 0.1s forwards;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand { display: inline-flex; align-items: center; gap: 10px; font-size: 1rem; font-weight: 600; letter-spacing: -0.02em; }

    .check {
      display: grid;
      place-items: center;
      width: 60px;
      height: 60px;
      margin: 36px auto 0;
      border-radius: 50%;
      background: rgba(109, 91, 255, 0.14);
      color: var(--accent-bright);
    }

    h1 { margin-top: 26px; font-size: clamp(1.6rem, 4.5vw, 2.1rem); font-weight: 700; letter-spacing: -0.03em; }
    p { margin-top: 14px; font-size: 0.98rem; line-height: 1.7; color: var(--text-muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      margin-top: 32px;
      padding: 14px 30px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      box-shadow: 0 10px 30px -14px rgba(109, 91, 255, 0.7);
      transition: background 0.3s ease, transform 0.35s var(--ease-out);
    }
    .btn:hover { background: #7a68ff; transform: translateY(-1px); }

    @media (prefers-reduced-motion: reduce) {
      .panel { opacity: 1; animation: none; }
    }
  </style>
</head>
<body>

  <main class="panel">
    <a href="/" class="brand" aria-label="AutomatizeNow — inicio">
      <svg width="26" height="26" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <defs>
          <linearGradient id="g-mark" x1="5" y1="28" x2="26" y2="5" gradientUnits="userSpaceOnUse">
            <stop stop-color="#4B2FE0"/>
            <stop offset="1" stop-color="#8B63FF"/>
          </linearGradient>
        </defs>
        <path d="M5 27 L14.6 6.5 L23 18.5" stroke="url(#g-mark)" stroke-width="5.6" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="27.2" cy="26.4" r="3.4" fill="#8B72FF"/>
      </svg>
      <span>AutomatizeNow</span>
    </a>

    <div class="check" aria-hidden="true">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12.5 4.5 4.5L19 7.5"/></svg>
    </div>

    <h1>Mensaje recibido</h1>
    <p>
      Gracias por escribirnos. Hemos recibido tu solicitud y te responderemos
      en <strong>menos de 24 horas</strong> con los siguientes pasos.
    </p>

    <a href="/" class="btn">Volver al inicio</a>
  </main>

</body>
</html>
